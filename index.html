<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <!-- 
        LO OBVIO: Si no pongo esta línea, tu celular va a intentar mostrar la web 
        como si fuera un monitor de tubo de 1995. Suerte tratando de leer algo 
        sin usar una lupa. 
    -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Efecto Burbujas Responsive</title>

    <!-- 
        ESTÉTICA: Acá conectamos el CSS. Es básicamente el maquillaje de la página. 
        Sin esto, solo verías texto blanco sobre fondo negro, muy aburrido.
    -->
    <link rel="stylesheet" href="css43/style.css">
</head>
<body>
    <!-- 
        EL PELOTERO (Layer 0): 
        Este div está más vacío que mi cuenta bancaria, pero el JavaScript lo va 
        a llenar de burbujas. Lo dejamos separado para que las burbujas no te 
        pateen el texto cuando quieras leer. Se llama "orden", busquenlo.
    -->
    <div id="burbujas-container"></div>

    <!-- 
        EL CONTENIDO (Donde ocurre la magia): 
        Uso <main> porque soy un técnico con estándares. Este bloque flota 
        encima de todo. Es como la crema en el café: lo de arriba es lo que importa.
    -->
    <main class="main-wrapper">
        <!-- 
            GLASS-CARD: El famoso efecto "vidrio esmerilado". 
            Si no tiene transparencias y desenfoque, no es una web del 2026, 
            es un archivo de Word subido a la red.
        -->
        <div class="glass-card">
            <h1>Tu Vidriera al Mundo</h1>
            
            <p>
                Una página web es como un <strong>taller que nunca cierra</strong>. 
                (A diferencia de la ferretería del barrio, esta no se toma dos horas de siesta).
            </p>

            <p>
                Acá mezclamos lógica y diseño para demostrar que estar en internet 
                es mucho más que tener un perfil de Facebook abandonado.
            </p>

            <!-- 
                DINÁMICO: Espacio reservado para que el JS escriba cosas. 
                Por ahora está esperando órdenes, como ayudante de electricista en su primer día.
            -->
            <div id="dinamico"></div>
        </div>
    </main>

    <!-- 
        EL CEREBRO: Llamamos al script al final. 
        Primero queremos que veas la cara del sitio y después que empiece a funcionar. 
        Nadie tiene tiempo para esperar a que un código cargue antes de ver el título.
    -->
    <script src="script.js"></script>
</body>
</html>
